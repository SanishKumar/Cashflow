# ──────────────────────────────────────────────────────
# CashFlow Management — Docker Compose
# Full stack: Frontend + Backend + PostgreSQL + Redis
# ──────────────────────────────────────────────────────

services:
  # ── Frontend (React + Vite → Nginx) ────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - cashflow
    restart: unless-stopped

  # ── Backend (Node.js + Express + Prisma) ───────────
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://cashflow:cashflow@db:5432/cashflow?schema=public
      REDIS_URL: redis://redis:6379
      PORT: "4000"
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cashflow
    restart: unless-stopped

  # ── PostgreSQL Database ────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
      POSTGRES_DB: cashflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cashflow
    restart: unless-stopped

  # ── Redis (Session + Socket.io Pub/Sub) ────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cashflow
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  cashflow:
    driver: bridge
